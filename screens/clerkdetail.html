<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/clerk.css"
    <title>Clerk Detail</title>
</head>
<body>

<div class="queue-detail-container">

    <!-- HEADER -->
<div class="top-bar">
  <div class="top-left">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/APM_Terminals_logo.svg">
    <div class="top-menu">
      <span>About</span>
      <span>Settings</span>
    </div>
  </div>

  <div class="top-right">
    Clerk: Ozzy &nbsp;&nbsp; Role: Lane Clerk
  </div>
</div>

<!-- LANE -->
<div class="lane-bar">
  <div>Lane: 01 (Inbound)</div>
  <div>Gate Pass: 00002113</div>
</div>

<!-- MAIN -->
<div class="main">

<!-- LEFT -->
<div class="left-panel">

  <div class="form">
    <label>Driver Card:</label><input value="57564">
    <label>TVA Number:</label><input value="52">

    <label>Truck LP:</label><input value="B7B6B6">
    <label>Trailer LP:</label><input value="S31">

    <label>Weight:</label><input value="34000">
    <label>Visit Id:</label><input value="112">
  </div>

  <div class="mode-row">
    <div class="mode-box red">🚚<br>Import - RI</div>
    <div class="mode-box green">🚚<br>Import - DI</div>
  </div>

  <div class="section-title">InGate Transaction - RI</div>

  <div class="form">
    <label>Container:</label><input value="MSMU7441730">
    <label>Size/Type:</label><input value="45G0" style="border-color:red;">

    <label>Door Direction:</label><select><option>Back</option></select>
    <label>Position:</label><select><option>Middle</option></select>

    <label>Seal Presence:</label><input type="checkbox" checked>
  </div>

  <div class="error-box">
    Move Errors:<br><br>
    - Container MSMU7441730 has ISO Code 45G0 mismatch
  </div>

  <div class="left-actions">
    <button>Back (F6)</button>
    <button>Cancel Move (F12)</button>
  </div>

</div>

<!-- RIGHT -->
<div class="right-panel">

  <div class="viewer">
    <img src="https://images.unsplash.com/photo-1595433707802-0a3d4f8b0b91">
  </div>

  <div class="side-panel">
    <div class="thumb"><img src="https://images.unsplash.com/photo-1595433707802-0a3d4f8b0b91"><span>Back</span></div>
    <div class="thumb"><img src="https://images.unsplash.com/photo-1595433707802-0a3d4f8b0b91"><span>Left</span></div>
    <div class="thumb"><img src="https://images.unsplash.com/photo-1595433707802-0a3d4f8b0b91"><span>Truck LP</span></div>
    <div class="thumb"><img src="https://images.unsplash.com/photo-1595433707802-0a3d4f8b0b91"><span>Trailer LP</span></div>
  </div>

</div>

</div>

<!-- FOOTER -->
<div class="footer">
  Last Refresh Time: 16:54:12
</div>

<!-- ACTIONS -->
<div class="bottom-bar">
  <button>Submit (F1)</button>
  <button>Cancel Visit (F2)</button>
  <button>Open Barrier (F4)</button>
  <button>Reject (F5)</button>
</div>

</head>

<script src="../assets/js/app.js"></script>
</body>
</html>
